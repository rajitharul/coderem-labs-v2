<svg width="450" height="450" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .wave {
      opacity: 0;
      animation: wave-in 0.5s ease-out forwards;
    }
    .bracket {
      stroke-dasharray: 90;
      stroke-dashoffset: 90;
      animation: draw 0.8s ease-out forwards;
    }
    .bracket-right {
      animation-delay: 0.2s;
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes wave-in {
      to { opacity: 0.8; }
    }
  </style>
  <g filter="url(#glow-logo)">
    <path class="wave" d="M20 50 Q35 40 50 50 T80 50" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="d" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
        values="M20 50 Q35 40 50 50 T80 50;M20 50 Q35 60 50 50 T80 50;M20 50 Q35 40 50 50 T80 50"/>
    </path>
    <path class="wave" d="M20 52 Q35 30 50 52 T80 52" stroke="#2dd4bf" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="d" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
        values="M20 52 Q35 30 50 52 T80 52;M20 52 Q35 70 50 52 T80 52;M20 52 Q35 30 50 52 T80 52"/>
    </path>
    <path class="wave" d="M20 54 Q35 20 50 54 T80 54" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="d" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
        values="M20 54 Q35 20 50 54 T80 54;M20 54 Q35 80 50 54 T80 54;M20 54 Q35 20 50 54 T80 54"/>
    </path>
  </g>
  <path class="bracket" d="M35 20 H20 V80 H35" stroke="#0f172a" stroke-width="6" stroke-linecap="butt"/>
  <path class="bracket bracket-right" d="M65 20 H80 V80 H65" stroke="#0f172a" stroke-width="6" stroke-linecap="butt"/>
  <defs>
    <filter id="glow-logo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
</svg>
